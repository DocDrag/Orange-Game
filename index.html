<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6 pt-10">

    <!-- Navbar ด้านบนสุดของหน้า -->
    <nav class="w-full flex items-center justify-between px-6 py-3 bg-white shadow-sm mb-6 fixed top-0 left-0 z-50 border-b border-gray-100">
        <!-- โลโก้รูปส้ม (ใช้ emoji) -->
        <div class="flex items-center gap-2">
            <span class="text-3xl">🍊</span>
            <span class="font-black text-xl text-orange-600 tracking-wide">เกมส้ม</span>
        </div>
        <!-- ปุ่มด้านขวา: credit และ Save/Load -->
        <div class="flex items-center gap-2">
            <button id="saveBtn"
                class="bg-green-500 hover:bg-green-600 text-white font-semibold px-5 py-2 rounded-lg shadow-sm transition active:scale-95">Save</button>
            <label for="loadFile"
                class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg shadow-sm transition cursor-pointer active:scale-95">
                Load
                <input type="file" id="loadFile" accept=".json" class="hidden" />
            </label>
            <a href="https://www.youtube.com/live/TTaur_JfrCs?si=K-lf_ghMbp22_hwj" target="_blank"
                class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-5 py-2 rounded-lg shadow-sm transition active:scale-95">
                Credit
            </a>
        </div>
    </nav>
    
    <!-- Sidebar ด้านซ้าย -->
    <aside id="sidebar"
        class="fixed top-16 left-0 w-72 h-full bg-white/90 backdrop-blur-2xl shadow-[15px_0_30px_rgba(0,0,0,0.04)] z-40 flex flex-col p-6 gap-3 border-r border-white/50 transform -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]">
        
        <!-- แท็บปุ่ม ☰ เลื่อนซ้ายขวา (เปลี่ยนเป็นลูกศร) -->
        <button id="toggleSidebar" onclick="sidebar()"
            class="absolute -right-[48px] top-8 bg-white/90 backdrop-blur-xl border border-gray-100/50 text-gray-400 hover:text-orange-500 w-12 h-14 rounded-r-2xl shadow-[8px_4px_20px_rgba(0,0,0,0.06)] z-40 transition-all duration-300 hover:w-14 active:scale-95 flex items-center justify-center group">
            <i class="fas fa-chevron-right text-lg transition-transform duration-300 group-hover:translate-x-1" id="sidebarIcon"></i>
        </button>
        
        <!-- Header ภายใน Sidebar -->
        <div class="flex items-center gap-3 mb-2 px-2">
            <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-500 font-black text-xl shadow-inner">
                <i class="fas fa-gamepad text-base"></i>
            </div>
            <div class="text-sm font-black text-gray-800 uppercase tracking-widest drop-shadow-sm leading-tight">
                เมนูหลัก
                <span class="text-orange-500 font-bold block text-[10px] tracking-normal uppercase">Main Menu</span>
            </div>
        </div>

        <hr class="border-gray-100/80 mb-2 w-full">

        <!-- ปุ่มต่าง ๆ (จะถูกจัดการ Class ด้วย JavaScript) -->
        <button id="btnPageBoard" onclick="changePageBoard()">
            <div><i class="fas fa-dice text-lg"></i></div>
            เกมกระดาน
        </button>
        <button id="btnPageChar" onclick="changePageChar()">
            <div><i class="fas fa-users text-lg"></i></div>
            ตัวละคร
        </button>
        <button id="btnPageShop" onclick="changePageShop()">
            <div><i class="fas fa-store text-lg"></i></div>
            ร้านค้า
        </button>
        <button id="btnPageWheel" onclick="changePageWheel()">
            <div><i class="fas fa-dharmachakra text-lg"></i></div>
            ระบบสุ่มวงล้อ
        </button>
        <button id="btnPageDuel" onclick="changePageDuel()">
            <div><i class="fas fa-khanda text-lg"></i></div>
            ระบบดูเอล
        </button>
    </aside>

    <div id="toast"
        class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-sm px-6 py-3 rounded-full shadow-2xl z-50 hidden transition-opacity duration-500 font-medium">
    </div>

    <!-- game-board-space -->
    <div id="game-board-space">
        <!-- ขยับเนื้อหาทั้งหมดลงมาให้ไม่ทับ Navbar -->
        <div class="pt-16"></div>

        <svg id="special-lines" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"
            style="overflow: visible;"></svg>

        <!-- Game Board + ปุ่มเพิ่มผู้เล่นด้านขวา -->
        <div class="relative flex flex-row items-start justify-center w-full">
            <!-- ดันพื้นที่ให้ Game Board ยังคงอยู่ตรงกลาง -->
            <div id="left-space" class="flex flex-col justify-between items-center mr-16 relative"
                style="height: 100%;">
            </div>
            <!-- Game Board -->
            <div class="relative" id="game-wrapper">
                <svg class="absolute top-0 left-0 w-full h-full pointer-events-none z-0" id="lines"></svg>
                <div class="grid grid-cols-7 gap-4 relative z-10" id="game-board"></div>
            </div>
            <!-- ปุ่มเพิ่มผู้เล่น 4 ปุ่ม -->
            <div id="add-player-buttons" class="flex flex-col justify-between items-center ml-16" style="height: 100%;">
                <!-- ปุ่มจะถูกสร้างด้วย JS เพื่อให้ขนาดสัมพันธ์กับ Game Board -->
            </div>
        </div>

        <!-- วงล้อ -->
        <div class="relative flex flex-col items-center gap-5 mt-3">
            <!-- ผลลัพธ์ -->
            <div id="result" class="text-xl font-bold text-[#333] text-center min-h-[30px]"></div>

            <!-- Wheel (conic-gradient) -->
            <div class="relative w-[300px] h-[300px]">
                <!-- Pointer -->
                <div
                    class="absolute -top-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[20px] border-t-[#333] z-10">
                </div>
                <div id="wheel"
                    class="w-full h-full rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.3)] transition-transform duration-[1500ms] ease-[cubic-bezier(0.25,0.1,0.25,1)] border-4 border-white cursor-pointer"
                    style="background: conic-gradient(
                     from 0deg,
                     #FF5722 0deg 216deg,
                     #FF9800 216deg 324deg,
                     #FFC107 324deg 360deg
                 );">
                    <!-- เพิ่มข้อความบนแต่ละส่วน -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <!-- ส่วนที่ 1 -->
                        <div class="absolute text-white font-bold text-5xl"
                            style="transform: rotate(108deg) translateY(-100px) rotate(-108deg);">1</div>
                        <!-- ส่วนที่ 2 -->
                        <div class="absolute text-white font-bold text-5xl"
                            style="transform: rotate(270deg) translateY(-100px) rotate(-270deg);">2</div>
                        <!-- ส่วนที่ 3 -->
                        <div class="absolute text-white font-bold text-5xl"
                            style="transform: rotate(342deg) translateY(-100px) rotate(-342deg);">3</div>
                    </div>
                </div>
                <!-- Spin Button -->
                <button id="spinBtn"
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-[#333] z-10 pointer-events-none">
                </button>
            </div>
        </div>
    </div>

    <!-- character-space -->
    <div id="character-space" class="hidden pt-14 px-4 w-full h-screen grid grid-cols-4 gap-4 max-w-8xl mx-auto">
        <!-- ตัวละครผู้เล่น 1 -->
        <div class="flex flex-col items-center bg-white rounded-2xl shadow-lg px-4 py-6 space-y-4">
            <img src="" class="w-24 h-24 rounded-full border-4 border-orange-400 object-cover shadow mb-2" />
            <div class="text-center space-y-3 w-full">
                <!-- GOLD Section -->
                <div class="bg-yellow-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="gold-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="font-bold text-yellow-600 text-lg">GOLD: <span class="gold-count">0</span></div>
                        <button
                            class="gold-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <!-- Orange Section -->
                <div class="bg-orange-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="orange-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="text-orange-600 text-md font-semibold">ส้ม: <span class="orange-count">0</span>
                        </div>
                        <button
                            class="orange-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <!-- ช่องเก็บของ -->
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                </div>
            </div>
        </div>
        <!-- ตัวละครผู้เล่น 2 -->
        <div class="flex flex-col items-center bg-gray-100 rounded-2xl shadow-lg px-4 py-6 space-y-4">
            <img src="" class="w-24 h-24 rounded-full border-4 border-orange-400 object-cover shadow mb-2" />
            <div class="text-center space-y-3 w-full">
                <div class="bg-yellow-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="gold-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="font-bold text-yellow-600 text-lg">GOLD: <span class="gold-count">0</span></div>
                        <button
                            class="gold-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="bg-orange-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="orange-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="text-orange-600 text-md font-semibold">ส้ม: <span class="orange-count">0</span>
                        </div>
                        <button
                            class="orange-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                </div>
            </div>
        </div>
        <!-- ตัวละครผู้เล่น 3 -->
        <div class="flex flex-col items-center bg-white rounded-2xl shadow-lg px-4 py-6 space-y-4">
            <img src="" class="w-24 h-24 rounded-full border-4 border-orange-400 object-cover shadow mb-2" />
            <div class="text-center space-y-3 w-full">
                <div class="bg-yellow-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="gold-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="font-bold text-yellow-600 text-lg">GOLD: <span class="gold-count">0</span></div>
                        <button
                            class="gold-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="bg-orange-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="orange-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="text-orange-600 text-md font-semibold">ส้ม: <span class="orange-count">0</span>
                        </div>
                        <button
                            class="orange-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                </div>
            </div>
        </div>
        <!-- ตัวละครผู้เล่น 4 -->
        <div class="flex flex-col items-center bg-gray-100 rounded-2xl shadow-lg px-4 py-6 space-y-4">
            <img src="" class="w-24 h-24 rounded-full border-4 border-orange-400 object-cover shadow mb-2" />
            <div class="text-center space-y-3 w-full">
                <div class="bg-yellow-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="gold-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="font-bold text-yellow-600 text-lg">GOLD: <span class="gold-count">0</span></div>
                        <button
                            class="gold-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="bg-orange-100 rounded-xl p-4 shadow-inner">
                    <div class="flex items-center justify-center gap-2">
                        <button
                            class="orange-minus bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full text-sm font-bold">-</button>
                        <div class="text-orange-600 text-md font-semibold">ส้ม: <span class="orange-count">0</span>
                        </div>
                        <button
                            class="orange-plus bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full text-sm font-bold">+</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                    <div class="aspect-square bg-gray-200 rounded shadow-inner w-full"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- shop space -->
    <div id="shop-space" class="hidden pt-12 px-4 w-full h-screen max-w-5xl mx-auto"></div>

    <!-- wheel space -->
    <div id="wheel-space" class="hidden pt-10 px-4 w-full h-screen max-w-4xl mx-auto flex flex-col items-center">
        <h2 class="text-3xl font-bold text-center text-orange-600 mb-3 drop-shadow-sm">🎡 วงล้อเสี่ยงดวง</h2>

        <select id="wheelSelector" onchange="initMainWheel()"
            class="mb-3 p-3 w-64 text-lg border-2 border-orange-400 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500 font-semibold text-center cursor-pointer">
            <option value="CHANCE">วงล้อ CHANCE</option>
            <option value="GAMBLE">วงล้อ GAMBLE</option>
            <option value="GOOD">วงล้อ GOOD</option>
            <option value="BAD">วงล้อ BAD</option>
            <option value="BOARD">วงล้อสุ่มช่องกระดาน</option>
            <option value="PLAYER">วงล้อสุ่มผู้เล่น</option>
        </select>

        <div id="mainWheelResult"
            class="text-2xl font-bold text-red-600 text-center min-h-[40px] mb-6 bg-white px-6 py-2 rounded-full shadow-md border border-gray-200 w-full max-w-md">
            พร้อมสุ่มแล้ว!
        </div>

        <div class="relative w-[350px] h-[350px] sm:w-[450px] sm:h-[450px]">
            <div
                class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[30px] border-t-black z-20 drop-shadow-md">
            </div>

            <div id="mainWheelContainer"
                class="w-full h-full rounded-full shadow-2xl transition-transform duration-[3500ms] ease-[cubic-bezier(0.2,0.8,0.2,1)] border-8 border-white cursor-pointer relative overflow-hidden bg-gray-200">
            </div>

            <button id="mainSpinBtn" onclick="spinMainWheel()"
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-white border-4 border-gray-800 text-gray-800 font-black text-xl z-20 shadow-[0_0_15px_rgba(0,0,0,0.3)] hover:bg-gray-100 hover:scale-105 transition-all active:scale-95">
                SPIN
            </button>
        </div>
    </div>

    <!-- duel space -->
    <div id="duel-space" class="hidden pt-10 px-4 w-full h-screen max-w-7xl mx-auto flex flex-col items-center">
        <h2 class="text-4xl font-extrabold text-center text-gray-800 mb-2 drop-shadow-sm">⚔️ DUEL ARENA ⚔️</h2>
        
        <div id="duelResult" class="text-3xl font-bold text-gray-800 text-center min-h-[50px] mb-8 bg-white px-10 py-3 rounded-full shadow-lg border border-gray-100 w-full max-w-2xl transition-all">
            เตรียมพร้อมดูเอล!
        </div>

        <div class="duel-arena-container">
            
            <div class="bet-panel red-side shadow-xl rounded-2xl p-6 border-l-8 border-red-500 bg-white">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center text-red-500 text-3xl shadow-inner">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-red-600">ฝ่ายแดง</h3>
                        <p class="text-sm text-gray-500">Player 1</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">จำนวนเงินเดิมพัน (G)</label>
                    <input type="number" id="duelBet1" value="1" min="1" oninput="updateDuelWheel()" 
                        class="w-full text-3xl font-black text-center border-2 border-red-200 rounded-xl p-3 focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 bg-white text-red-700 shadow-inner">
                </div>
                <div class="text-center mt-4 text-gray-500 font-medium">โอกาสชนะ: <span id="p1PercentLabel">50</span>%</div>
            </div>

            <div class="wheel-panel relative flex flex-col items-center">
                <div class="absolute -top-5 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[25px] border-l-transparent border-r-[25px] border-r-transparent border-t-[35px] border-t-gray-900 z-20 drop-shadow-lg"></div>
                
                <div id="duelWheelContainer" class="w-[380px] h-[380px] sm:w-[450px] sm:h-[450px] rounded-full shadow-2xl transition-transform duration-[4000ms] ease-[cubic-bezier(0.1,0.9,0.1,1)] border-[12px] border-white cursor-pointer relative overflow-hidden bg-gray-100">
                    </div>

                <button id="duelSpinBtn" onclick="spinDuelWheel()" 
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28 rounded-full bg-gray-900 border-8 border-white text-white font-black text-2xl z-20 shadow-[0_0_20px_rgba(0,0,0,0.5)] hover:bg-black hover:scale-105 transition-all active:scale-95 flex items-center justify-center">
                    FIGHT
                </button>
            </div>

            <div class="bet-panel blue-side shadow-xl rounded-2xl p-6 border-r-8 border-blue-500 bg-white">
                <div class="flex items-center gap-4 mb-4 justify-end">
                    <div class="text-right">
                        <h3 class="text-2xl font-bold text-blue-600">ฝ่ายน้ำเงิน</h3>
                        <p class="text-sm text-gray-500">Player 2</p>
                    </div>
                    <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-3xl shadow-inner">
                        <i class="fas fa-user-ninja"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700 text-right">จำนวนเงินเดิมพัน (G)</label>
                    <input type="number" id="duelBet2" value="1" min="1" oninput="updateDuelWheel()" 
                        class="w-full text-3xl font-black text-center border-2 border-blue-200 rounded-xl p-3 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 bg-white text-blue-700 shadow-inner">
                </div>
                <div class="text-center mt-4 text-gray-500 font-medium">โอกาสชนะ: <span id="p2PercentLabel">50</span>%</div>
            </div>

        </div>

        <div class="duel-mobile-bets w-full max-w-sm mt-8 space-y-4 sm:hidden">
            <div class="flex items-center gap-2 bg-white p-3 rounded-xl shadow border border-red-200">
                <span class="font-bold text-red-600">แดง (G):</span>
                <input type="number" id="duelBet1Mobile" value="1" min="1" oninput="syncMobileBets(1)" class="w-full text-center border border-gray-300 rounded p-1">
            </div>
            <div class="flex items-center gap-2 bg-white p-3 rounded-xl shadow border border-blue-200">
                <span class="font-bold text-blue-600">น้ำเงิน (G):</span>
                <input type="number" id="duelBet2Mobile" value="1" min="1" oninput="syncMobileBets(2)" class="w-full text-center border border-gray-300 rounded p-1">
            </div>
        </div>

    </div>

    <!-- Modal สำหรับเพิ่มผู้เล่น -->
    <div id="player-modal-bg" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg p-6 w-120 relative">

    <script>
        let isSpinning = false;
        let currentRotation = 0;

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const result = document.getElementById('result');

        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            spinBtn.disabled = true;
            result.textContent = '';

            const randomRotation = Math.floor(Math.random() * 1800) + 700; // หมุนระหว่าง 700 ถึง 2500 องศา
            currentRotation -= randomRotation;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const finalRotation = (currentRotation % 360) * -1;
                let resultNumber;

                if (finalRotation >= 0 && finalRotation < 216) {
                    resultNumber = 1;
                } else if (finalRotation >= 216 && finalRotation < 324) {
                    resultNumber = 2;
                } else {
                    resultNumber = 3;
                }

                result.textContent = `ผลลัพธ์: ${resultNumber}`;
                isSpinning = false;
                spinBtn.disabled = false;
            }, 1500); // เวลา 1500
        }

        spinBtn.addEventListener('click', spinWheel);
        wheel.addEventListener('click', spinWheel);
    </script>

    <script>
        const TYPES = ["GOOD", "BAD", "CHANCE", "MONEY +1", "DUEL", "GAMBLE", "blank"];

        let layout = [
            ["blank", "BAD", "CHANCE", "blank", "BAD", "blank", "CHANCE"],
            ["DUEL", "blank", null, "blank", "blank", null, "MONEY +1"],
            ["blank", "GOOD", "blank", "START", "blank", "CHANCE", "blank"],
            ["MONEY +1", "CHANCE", "MONEY +1", "blank", "GAMBLE", null, "CHANCE"],
            ["CHANCE", null, "blank", "GOOD", "blank", "CHANCE", "MONEY +1"]
        ];

        const board = document.getElementById("game-board");
        const lines = document.getElementById("lines");

        const positions = {};

        let cellNumber = 1;

        // สร้าง cell ทั้งหมดก่อน
        layout.forEach((row, y) => {
            row.forEach((type, x) => {
                if (type === null) {
                    // ช่อง null: เว้นระยะห่าง
                    const emptyDiv = document.createElement("div");
                    emptyDiv.className = "w-28 h-20 opacity-0 pointer-events-none";
                    board.appendChild(emptyDiv);
                    return;
                }

                const div = document.createElement("div");
                div.className = "cell flex items-center justify-center border border-gray-400 rounded-md w-28 h-20 text-xs font-semibold text-center select-none transition hover:bg-gray-100 cursor-pointer relative";

                // เพิ่มสีตามประเภท
                if (type === "blank") {
                    div.classList.add("bg-gray-300");
                } else if (type === "CHANCE") {
                    div.classList.add("bg-purple-300");
                } else if (type === "MONEY +1") {
                    div.classList.add("bg-yellow-200");
                } else if (type === "BAD") {
                    div.classList.add("bg-gradient-to-r", "from-red-400", "to-orange-400");
                } else if (type === "DUEL") {
                    div.classList.add("bg-gradient-to-r", "from-black", "to-blue-900");
                } else if (type === "GOOD") {
                    div.classList.add("bg-gradient-to-r", "from-yellow-300", "to-sky-300");
                } else if (type === "GAMBLE") {
                    div.classList.add("bg-gradient-to-r", "from-pink-400", "to-yellow-300");
                } else {
                    div.classList.add("bg-white");
                }

                div.dataset.row = y;
                div.dataset.col = x;

                // สร้าง span สำหรับข้อความหลัก
                const typeSpan = document.createElement("span");
                typeSpan.className = "cell-type";
                typeSpan.textContent = type === "blank" ? "" : type;
                // กำหนดสีข้อความสำหรับ DUEL
                if (type === "DUEL") {
                    typeSpan.classList.add("text-white");
                }
                div.appendChild(typeSpan);

                const id = `${y}-${x}`;
                positions[id] = { x, y };

                // เฉพาะช่อง START ไม่ต้องแสดงเลข
                if (type === "START") {
                    div.classList.add("bg-white", "font-bold");
                } else {
                    // เพิ่มเลขช่องที่มุมขวาล่าง
                    const numSpan = document.createElement("span");
                    numSpan.textContent = cellNumber;
                    // ถ้าเป็น DUEL ให้เลขเป็นสีขาว
                    numSpan.className = `absolute bottom-1 right-2 text-[10px] ${type === "DUEL" ? "text-white" : "text-black"}`;
                    div.appendChild(numSpan);
                    cellNumber++;
                }

                if (type !== "START") {
                    // คลิกขวาเพื่อเปลี่ยนประเภทช่อง
                    div.addEventListener("contextmenu", (e) => {
                        e.preventDefault();

                        // ถ้ามี select เดิมอยู่แล้ว ให้ลบก่อน
                        const oldSelect = div.querySelector("select.cell-type-select");
                        if (oldSelect) oldSelect.remove();

                        // สร้าง select
                        const select = document.createElement("select");
                        select.className = "cell-type-select absolute bottom-1 left-1 text-xs bg-white border rounded shadow z-20";
                        TYPES.forEach(optType => {
                            if (optType === "START") return; // ไม่ให้เลือก START
                            const option = document.createElement("option");
                            option.value = optType;
                            option.textContent = optType === "blank" ? "(blank)" : optType;
                            if ((typeSpan.textContent === "" && optType === "blank") || typeSpan.textContent === optType) {
                                option.selected = true;
                            }
                            select.appendChild(option);
                        });

                        // เมื่อเลือกแล้วเปลี่ยนประเภทช่อง
                        select.addEventListener("change", () => {
                            const next = select.value;
                            loadLayout(next, div, typeSpan);
                            select.remove();
                        });

                        // เมื่อ select เสีย focus ให้ลบ
                        select.addEventListener("blur", () => select.remove());

                        div.appendChild(select);
                        select.focus();
                    });
                }

                board.appendChild(div);
            });
        });

        function loadLayout(next, div, typeSpan) {
            typeSpan.textContent = next === "blank" ? "" : next;

            // อัปเดต layout array
            layout[parseInt(div.dataset.row)][parseInt(div.dataset.col)] = next;

            // เปลี่ยนสีข้อความ DUEL
            typeSpan.classList.remove("text-white");
            if (next === "DUEL") typeSpan.classList.add("text-white");

            // เปลี่ยนสีพื้นหลัง
            div.classList.remove(
                "bg-gray-300", "bg-purple-300", "bg-yellow-200", "bg-white",
                "bg-gradient-to-br", "bg-gradient-to-r",
                "from-red-400", "to-orange-400",
                "from-black", "to-blue-900",
                "from-yellow-300", "to-sky-300",
                "from-pink-400", "to-yellow-300"
            );
            if (next === "blank") {
                div.classList.add("bg-gray-300");
            } else if (next === "CHANCE") {
                div.classList.add("bg-purple-300");
            } else if (next === "MONEY +1") {
                div.classList.add("bg-yellow-200");
            } else if (next === "BAD") {
                div.classList.add("bg-gradient-to-r", "from-red-400", "to-orange-400");
            } else if (next === "DUEL") {
                div.classList.add("bg-gradient-to-r", "from-black", "to-blue-900");
            } else if (next === "GOOD") {
                div.classList.add("bg-gradient-to-r", "from-yellow-300", "to-sky-300");
            } else if (next === "GAMBLE") {
                div.classList.add("bg-gradient-to-r", "from-pink-400", "to-yellow-300");
            } else {
                div.classList.add("bg-white");
            }

            // เปลี่ยนสีตัวเลข
            const numSpan = div.querySelector("span:not(.cell-type)");
            if (numSpan) {
                numSpan.classList.remove("text-white", "text-black");
                if (next === "DUEL") {
                    numSpan.classList.add("text-white");
                } else {
                    numSpan.classList.add("text-black");
                }
            }
        }

        // Define paths between tiles (manually based on visual layout)
        const paths = [
            [[0, 0], [0, 6]], [[0, 0], [2, 0]], [[0, 1], [3, 1]], [[1, 0], [1, 1]], [[2, 0], [2, 6]],
            [[3, 0], [4, 0]], [[3, 0], [3, 4]], [[3, 2], [4, 2]], [[4, 2], [4, 6]], [[0, 3], [4, 3]],
            [[0, 4], [4, 4]], [[0, 6], [4, 6]]
        ];

        function drawSpecialLine(x, y, directionX, directionY, color, side) {
            const fromCell = document.querySelector(`.cell[data-row="${x}"][data-col="${y}"]`);
            if (!fromCell) return;

            const fromRect = fromCell.getBoundingClientRect();

            let p1x, p1y;

            if (side === "left") {
                p1x = fromRect.left;
                p1y = fromRect.top + fromRect.height / 2;
            } else if (side === "right") {
                p1x = fromRect.right;
                p1y = fromRect.top + fromRect.height / 2;
            } else if (side === "top") {
                p1x = fromRect.left + fromRect.width / 2;
                p1y = fromRect.top;
            } else if (side === "bottom") {
                p1x = fromRect.left + fromRect.width / 2;
                p1y = fromRect.bottom;
            }

            const p2x = p1x + directionX;
            const p2y = p1y + directionY;

            const overlaySvg = document.getElementById('special-lines');
            if (!overlaySvg) return;

            const specialLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            specialLine.setAttribute("x1", p1x);
            specialLine.setAttribute("y1", p1y);
            specialLine.setAttribute("x2", p2x);
            specialLine.setAttribute("y2", p2y);
            specialLine.setAttribute("stroke", color);
            specialLine.setAttribute("stroke-width", "4");
            specialLine.setAttribute("stroke-linecap", "round");

            // ✅ เพิ่มเส้นประ
            specialLine.setAttribute("stroke-dasharray", "8, 10");

            overlaySvg.appendChild(specialLine);
        }

        function drawLine(x1, y1, x2, y2) {
            // หา cell ต้นทางและปลายทาง
            const fromCell = document.querySelector(`.cell[data-row="${y1}"][data-col="${x1}"]`);
            const toCell = document.querySelector(`.cell[data-row="${y2}"][data-col="${x2}"]`);
            if (!fromCell || !toCell) return;

            // หา offset ของ game-board
            const boardRect = board.getBoundingClientRect();

            // กึ่งกลาง cell ต้นทาง
            const fromRect = fromCell.getBoundingClientRect();
            const p1x = fromRect.left - boardRect.left + fromRect.width / 2;
            const p1y = fromRect.top - boardRect.top + fromRect.height / 2;

            // กึ่งกลาง cell ปลายทาง
            const toRect = toCell.getBoundingClientRect();
            const p2x = toRect.left - boardRect.left + toRect.width / 2;
            const p2y = toRect.top - boardRect.top + toRect.height / 2;

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", p1x);
            line.setAttribute("y1", p1y);
            line.setAttribute("x2", p2x);
            line.setAttribute("y2", p2y);
            line.setAttribute("stroke", "#888");
            line.setAttribute("stroke-width", "3");
            line.setAttribute("stroke-linecap", "round");
            lines.appendChild(line);
        }

        // วาดเส้นหลัง DOM render แล้ว
        setTimeout(() => {
            paths.forEach(([from, to]) => drawLine(from[1], from[0], to[1], to[0]));
            drawSpecialLine(0, 0, -10000, 0, "red", "left"); // เส้นพิเศษ
            drawSpecialLine(1, 6, 10000, 0, "red", "right");
            drawSpecialLine(0, 1, 0, -10000, "orange", "top");
            drawSpecialLine(4, 5, 0, 10000, "orange", "bottom");
            drawSpecialLine(0, 4, 0, -10000, "#ADD8E6", "top");
            drawSpecialLine(4, 0, 0, 10000, "#ADD8E6", "bottom");
        }, 0);

        // หลังจากสร้าง Game Board แล้ว ให้เพิ่มปุ่มเพิ่มผู้เล่น
        window.addEventListener('DOMContentLoaded', () => {
            const gameBoard = document.getElementById('game-board');
            const addPlayerDiv = document.getElementById('add-player-buttons');

            // 🎯 สลับ input
            const urlWrapper = document.getElementById('url-input-wrapper');
            const textWrapper = document.getElementById('text-input-wrapper');
            const iconTypeRadios = document.querySelectorAll('input[name="icon-type"]');
            const uploadInputWrapper = document.getElementById('upload-input-wrapper');

            function hideModeInModalAll() {
                // เปลี่ยนใน Modal เป็น URL Mode
                urlWrapper.classList.add('hidden');
                textWrapper.classList.add('hidden');
                uploadInputWrapper.classList.add('hidden');
            }

            iconTypeRadios.forEach(radio => {
                radio.addEventListener('change', () => {
                    hideModeInModalAll();

                    if (radio.value === 'url') {
                        urlWrapper.classList.remove('hidden');
                    } else if (radio.value === 'text') {
                        textWrapper.classList.remove('hidden');
                    } else if (radio.value === 'upload') {
                        uploadInputWrapper.classList.remove('hidden');
                    }
                });
            });

            document.querySelectorAll('#character-space > div').forEach((card, index) => {
                // Gold buttons
                card.querySelector('.gold-plus').addEventListener('click', () => {
                    updatePlayerStat(index, 'gold', 1);
                });
                card.querySelector('.gold-minus').addEventListener('click', () => {
                    updatePlayerStat(index, 'gold', -1);
                });

                // Orange buttons
                card.querySelector('.orange-plus').addEventListener('click', () => {
                    updatePlayerStat(index, 'orange', 1);
                });
                card.querySelector('.orange-minus').addEventListener('click', () => {
                    updatePlayerStat(index, 'orange', -1);
                });
            });

            setTimeout(() => {
                const boardRect = gameBoard.getBoundingClientRect();
                const boardHeight = boardRect.height;

                const btnCount = 4;
                const btnGap = 16;
                const btnSize = (boardHeight - btnGap * (btnCount - 1)) / btnCount;

                addPlayerDiv.style.height = boardHeight + "px";
                addPlayerDiv.innerHTML = "";

                for (let i = 0; i < btnCount; i++) {
                    const btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = `add-player-btn flex items-center justify-center rounded-full bg-orange-400 hover:bg-orange-500 shadow w-[${btnSize}px] h-[${btnSize}px] text-white text-3xl transition-all`;
                    btn.style.width = btn.style.height = btnSize + "px";
                    btn.innerHTML = '<span class="pointer-events-none select-none">+</span>';
                    btn.title = "เพิ่มผู้เล่น";
                    btn.dataset.index = i;
                    addPlayerDiv.appendChild(btn);
                    if (i < btnCount - 1) {
                        const gap = document.createElement("div");
                        gap.style.height = btnGap + "px";
                        addPlayerDiv.appendChild(gap);
                    }
                }

                // Dummy left space
                const leftSpace = document.getElementById('left-space');
                leftSpace.style.height = boardHeight + "px";
                leftSpace.innerHTML = "";
                for (let i = 0; i < btnCount; i++) {
                    const dummy = document.createElement("div");
                    dummy.className = `rounded-full w-[${btnSize}px] h-[${btnSize}px] opacity-0`;
                    dummy.style.width = dummy.style.height = btnSize + "px";
                    leftSpace.appendChild(dummy);
                    if (i < btnCount - 1) {
                        const gap = document.createElement("div");
                        gap.style.height = btnGap + "px";
                        leftSpace.appendChild(gap);
                    }
                }

                const addOrangeBtn = document.createElement("button");
                addOrangeBtn.type = "button";
                addOrangeBtn.className = "absolute bg-orange-300 hover:bg-orange-200 text-white font-bold px-4 py-4 rounded-full shadow transition-all";
                addOrangeBtn.innerHTML = '🍊';
                addOrangeBtn.title = "เพิ่มส้มลงในบอร์ด";

                // วางปุ่มในตำแหน่งกึ่งกลางของ left-space และใกล้ช่องที่ 1
                addOrangeBtn.style.top = "0px";
                addOrangeBtn.style.left = "100%";
                addOrangeBtn.style.transform = "translateX(-50%)";

                addOrangeBtn.addEventListener('click', createOrange);

                leftSpace.appendChild(addOrangeBtn);

                // Modal logic
                const modalBg = document.getElementById('player-modal-bg');
                const closeModal = document.getElementById('close-modal');
                const playerForm = document.getElementById('player-form');
                const playerImgInput = document.getElementById('player-img');
                const playerBorderInput = document.getElementById('player-border');
                let currentBtn = null;

                // เปิด modal เมื่อกดปุ่มเพิ่มผู้เล่น
                window.bindAddPlayerBtnEvents = function () {
                    document.querySelectorAll('.add-player-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            currentBtn = btn;
                            playerForm.reset();
                            playerBorderInput.value = "#f97316";
                            modalBg.classList.remove('hidden');
                        });
                    });
                }
                bindAddPlayerBtnEvents();

                // ปิด modal
                closeModal.addEventListener('click', () => {
                    modalBg.classList.add('hidden');
                    // เปลี่ยนใน Modal เป็น URL Mode
                    hideModeInModalAll();
                    urlWrapper.classList.remove('hidden');
                });
                modalBg.addEventListener('click', (e) => {
                    if (e.target === modalBg) modalBg.classList.add('hidden');
                });

                // เมื่อ submit ฟอร์ม
                const playerUploadInput = document.getElementById('player-upload');
                playerForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    if (!currentBtn) return;

                    // เปลี่ยนใน Modal เป็น URL Mode
                    hideModeInModalAll();
                    urlWrapper.classList.remove('hidden');

                    const borderColor = playerBorderInput.value;

                    let imgUrl = "";
                    const iconType = document.querySelector('input[name="icon-type"]:checked').value;

                    if (iconType === "url") {
                        imgUrl = playerImgInput.value;
                    } else if (iconType === "text") {
                        const emoji = document.getElementById("player-text").value.trim();
                        if (!emoji) return alert("กรุณาใส่อิโมจิหรือข้อความ");
                        imgUrl = generateImageFromText(emoji);
                    } else if (iconType === "upload") {
                        const file = playerUploadInput.files[0];
                        if (!file) return alert("กรุณาเลือกรูปภาพก่อนนะคะ");

                            const reader = new FileReader();
                            reader.onload = (ev) => resolve(ev.target.result);

                    img.className = "player-img rounded-full object-cover cursor-pointer";
                    img.style.width = img.style.height = currentBtn.style.width;
                    img.style.border = `4px solid ${borderColor}`;
                    img.style.background = "#fff";

                    // เพิ่ม contextmenu สำหรับลบ
                    img.addEventListener('contextmenu', function (e) {

                        // ลบเมนูเดิมถ้ามี
                        document.querySelectorAll('.player-context-menu').forEach(m => m.remove());

                        // สร้างเมนู

                        menu.style.top = e.clientY + "px";
                        menu.style.left = e.clientX + "px";
                        menu.innerHTML = `<button class="text-red-600 hover:underline" type="button">ลบผู้เล่น</button>`;

                        // ลบผู้เล่นเมื่อกด
                        menu.querySelector('button').addEventListener('click', () => {
                            // สร้างปุ่มใหม่แทน img
                            const newBtn = createAddPlayerButton(img.dataset.index, parseFloat(img.style.width));
                            img.replaceWith(newBtn);
                            bindAddPlayerBtnEvents();
                            updateCharacterSpace();
                            menu.remove();

                            // 🔥 ลบตัวหมากผู้เล่นที่ตรงกับ dataset.index
                            const token = board.querySelector(`.absolute[data-index="${img.dataset.index}"]`);
                            if (token) token.remove();
                        });


                        // ลบเมนูเมื่อคลิกที่อื่น
                        document.body.addEventListener('click', function removeMenu(ev) {
                            if (!menu.contains(ev.target)) {
                                menu.remove();
                                document.body.removeEventListener('click', removeMenu);
                            }
                        });

                        document.body.appendChild(menu);
                    });

                    currentBtn.replaceWith(img);
                    updateCharacterSpace();

                    modalBg.classList.add('hidden');
                    currentBtn = null;

                    // หา cell START
                    const startCell = [...document.querySelectorAll('.cell')].find(cell => {
                        return cell.textContent.includes("START");
                    });
                    if (startCell) {
                        const token = document.createElement('div');
                        token.className = "absolute rounded-full border-4 cursor-grab active:cursor-grabbing";
                        token.style.width = "48px";
                        token.style.height = "48px";
                        token.style.backgroundImage = `url(${imgUrl})`;
                        token.style.backgroundSize = "cover";
                        token.style.borderColor = borderColor;
                        token.style.backgroundColor = "#fff";
                        token.dataset.index = img.dataset.index;

                        // ตำแหน่งเริ่มต้น
                        const rect = startCell.getBoundingClientRect();
                        const boardRect = board.getBoundingClientRect();
                        token.style.left = `${rect.left - boardRect.left + rect.width / 2 - 16}px`;
                        token.style.top = `${rect.top - boardRect.top + rect.height / 2 - 16}px`;

                        // ให้ลากได้
                        token.draggable = true;
                        token.addEventListener('dragstart', (e) => {
                            e.dataTransfer.setData('text/plain', token.dataset.index);
                            token.classList.add("opacity-50");
                        });
                        token.addEventListener('dragend', (e) => {
                            token.classList.remove("opacity-50");
                        });

                        // ✅ เพิ่มหมากเข้า board
                        board.appendChild(token);
                    }
                });
            }, 0);
        });

        // ให้วางไว้แค่ครั้งเดียวเท่านั้น
        board.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        board.addEventListener('drop', (e) => {
            e.preventDefault();
            const index = e.dataTransfer.getData('text/plain');
            const droppedToken = board.querySelector(`.absolute[data-index="${index}"]`);
            if (droppedToken) {
                const offsetX = 24; // ครึ่งหนึ่งของขนาดหมาก
                const offsetY = 24;
                const boardBox = board.getBoundingClientRect();
                droppedToken.style.left = `${e.clientX - boardBox.left - offsetX}px`;
                droppedToken.style.top = `${e.clientY - boardBox.top - offsetY}px`;
            }
        });

    </script>

    <script>
        function generateImageFromText(text, color = "#000", fontSize = 48) {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = 128;
            canvas.height = 128;
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = color;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            return canvas.toDataURL("image/png");
        }
    </script>

    <!-- Orange Logic -->
    <script>
        const orangeMap = new Map();

        function getCellKey(cell) {
            return `${cell.dataset.row}-${cell.dataset.col}`;
        }

        function getBoardOffsetPos(cell) {
            const rect = cell.getBoundingClientRect();
            const boardRect = board.getBoundingClientRect();
            return {
                left: rect.left - boardRect.left + rect.width / 2 - 46,
                top: rect.top - boardRect.top + rect.height / 2 - 46
            };
        }

        function updateOrangeDisplay(orange, count) {
            orange.dataset.count = count;
            orange.innerHTML = count > 1 ? `🍊x${count}` : '🍊';
        }

        function createOrUpdateOrangeAtCell(cell, amount = 1) {
            const key = getCellKey(cell);
            let orange = document.querySelector(`.orange-item[data-key="${key}"]`);

            if (orange) {
                const current = parseInt(orange.dataset.count || "1");
                updateOrangeDisplay(orange, current + amount);
            } else {
                const pos = getBoardOffsetPos(cell);
                orange = document.createElement('div');
                orange.className = "orange-item absolute cursor-pointer select-none";
                orange.dataset.key = key;
                orange.style.left = `${pos.left}px`;
                orange.style.top = `${pos.top}px`;
                orange.style.fontSize = '30px';
                orange.style.zIndex = '15';
                updateOrangeDisplay(orange, amount);
                bindOrangeContextMenu(orange);
                board.appendChild(orange);
            }
        }

        function getRandomCellForOrange() {
            const cells = document.querySelectorAll('.cell');
            return Array.from(cells).filter(c => c.querySelector('.cell-type')?.textContent !== 'START')
                .sort(() => 0.5 - Math.random())[0] || null;
        }

        function createOrange() {
            showToast("กำลังเพิ่มส้ม...");
            const cell = getRandomCellForOrange();
            if (cell) createOrUpdateOrangeAtCell(cell);
        }

        function bindOrangeContextMenu(orange) {
            orange.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                document.querySelectorAll('.orange-context-menu').forEach(m => m.remove());

                const menu = document.createElement('div');
                menu.className = "orange-context-menu absolute bg-white border rounded shadow px-3 py-2 text-sm z-50";
                menu.style.top = `${e.clientY}px`;
                menu.style.left = `${e.clientX}px`;
                menu.innerHTML = `
            <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-blue-600">สุ่มที่อยู่ใหม่</button>
            <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-purple-600">ย้ายที่</button>
            <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-rose-600">ลบส้ม</button>
        `;

                menu.children[0].addEventListener('click', () => {
                    const count = parseInt(orange.dataset.count || "1");
                    if (count > 1) updateOrangeDisplay(orange, count - 1);
                    else orange.remove();
                    createOrange();
                    menu.remove();
                });

                menu.children[1].addEventListener('click', () => {
                    menu.remove();
                    showToast("คลิกที่ตำแหน่งใหม่เพื่อย้ายส้ม");
                    setTimeout(() => {
                        const moveHandler = (ev) => {
                            const cell = ev.target.closest('.cell');
                            if (!cell || cell.querySelector('.cell-type')?.textContent === 'START') return;

                            createOrUpdateOrangeAtCell(cell);

                            let count = parseInt(orange.dataset.count || "1");
                            if (count > 1) updateOrangeDisplay(orange, count - 1);
                            else orange.remove();

                            document.removeEventListener('click', moveHandler);
                            document.getElementById("result").innerHTML = "";
                        };
                        document.addEventListener('click', moveHandler);
                    }, 10);
                });

                menu.children[2].addEventListener('click', () => {
                    let count = parseInt(orange.dataset.count || "1");
                    if (count > 1) updateOrangeDisplay(orange, count - 1);
                    else orange.remove();
                    menu.remove();
                });

                document.body.addEventListener('click', function closeMenu(ev) {
                    if (!menu.contains(ev.target)) {
                        menu.remove();
                        document.body.removeEventListener('click', closeMenu);
                    }
                });

                document.body.appendChild(menu);
            });
        }
    </script>

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        const cellSize = 20;

        async function saveItem() {
            const index = document.getElementById('item-modal').dataset.index;
            const cell = document.getElementById(`data-index-${index}`);
            const description = document.getElementById('item-description').value;
            const selected = document.querySelector('input[name="icon-item"]:checked').value;

            if (!cell) return;
            cell.classList.add('disabled');

            let imgUrl = '';

            if (selected === "url") {
                const url = document.getElementById("item-img").value;
                if (!url) return alert("กรุณาใส่ URL รูปภาพค่ะ");
                imgUrl = url;

            else if (selected === "text") {
                const text = document.getElementById("item-text").value;
                if (!text) return alert("กรุณาใส่อิโมจิหรือข้อความค่ะ");
                imgUrl = generateImageFromText(text);

            else if (selected === "upload") {
                const fileInput = document.getElementById("item-upload");
                if (fileInput.files.length === 0) return alert("กรุณาเลือกไฟล์ภาพก่อนค่ะ");

                imgUrl = await readFileAsDataURL(file);

            // ใส่ภาพลงช่อง
            cell.innerHTML = `<img src="${imgUrl}" class="w-${cellSize} h-${cellSize} object-cover rounded">`;
            cell.dataset.description = description;
            bindItemContextMenu(cell, index, description);
            closeItemModal();

        function bindItemContextMenu(cell, index, description) {
            cell.oncontextmenu = (e) => {
                e.preventDefault();
                document.querySelectorAll('.item-context-menu').forEach(m => m.remove());

                const menu = document.createElement('div');
                menu.className = "item-context-menu absolute bg-white border rounded shadow px-3 py-2 text-sm z-50";

                    <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-blue-600">คัดลอกรายละเอียด</button>
                    <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-green-600">ย้ายไปยังบอร์ด</button>
                    <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-orange-600">ย้ายไปยังหน้าตัวละคร</button>
                    <button class="block w-full text-left px-2 py-1 hover:bg-gray-100 text-rose-600">ลบไอเทม</button>
                `;

                // คัดลอกรายละเอียด
                menu.children[0].onclick = () => {
                    navigator.clipboard.writeText(description || "")
                        .then(() => showToast("คัดลอกข้อมูลไอเทมเรียบร้อยแล้ว"))
                        .catch(() => showToast("ไม่สามารถคัดลอกข้อมูลได้"));
                    menu.remove();
                };

                // ย้ายไปยังบอร์ด
                menu.children[1].onclick = () => {
                    const newItem = cell.cloneNode(true);
                    newItem.className = `absolute z-30 w-${cellSize / 2} h-${cellSize / 2} disabled destroy-immediately`;
                    newItem.style.top = "100px";
                    newItem.style.left = "100px";
                    // ปรับขนาดให้เล็กลง
                    const imageElement = newItem.querySelector('img');

                    // ลบจากร้านค้า
                    if (cell.classList.contains('destroy-immediately')) {
                        cell.remove();

                        // ถ้าไม่ใช่ destroy-immediately ให้แค่ลบข้อมูล
                        cell.innerHTML = "+";
                        cell.removeAttribute("data-description");
                        cell.classList.remove('disabled');
                    }
                    menu.remove();
                };

                // ย้ายไปยังหน้าตัวละคร

                    newItem.style.top = "100px";
                    newItem.style.left = "100px";

                    const description = cell.dataset.description || "";
                    bindItemContextMenu(newItem, index, description);
                    makeItemDraggable(newItem);
                    document.getElementById("character-space").appendChild(newItem);

                    // ลบจากร้านค้า
                    if (cell.classList.contains('destroy-immediately')) {

                        // ถ้าไม่ใช่ destroy-immediately ให้แค่ลบข้อมูล
                        cell.innerHTML = "+";
                        cell.removeAttribute("data-description");
                        cell.classList.remove('disabled');
                    }
                    menu.remove();
                };

                // ปิดเมนูเมื่อคลิกที่อื่น
                document.body.addEventListener('click', function removeMenu(ev) {
                    if (!menu.contains(ev.target)) {
                        menu.remove();
                        document.body.removeEventListener('click', removeMenu);
                    }
                });

                document.body.appendChild(menu);
            };
        }

        function makeItemDraggable(item) {
            item.style.position = "absolute";
            item.style.cursor = "grab";
            item.draggable = false;

            item.onmousedown = (e) => {
                e.preventDefault();

                const shiftX = e.clientX - item.getBoundingClientRect().left;
                const shiftY = e.clientY - item.getBoundingClientRect().top;

                function moveAt(pageX, pageY) {
                    item.style.left = pageX - shiftX + 'px';
                    item.style.top = pageY - shiftY + 'px';
                }

                function onMouseMove(event) {
                    moveAt(event.pageX, event.pageY);
                }

                document.addEventListener('mousemove', onMouseMove);

                item.onmouseup = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    item.onmouseup = null;
                };
            };

            item.ondragstart = () => false;
        }
    </script>

    <script>
        // เพิ่มตัวแปรเก็บข้อมูลผู้เล่น
        let playerStats = {
            0: { gold: 2, orange: 0 },
            1: { gold: 2, orange: 0 },
            2: { gold: 2, orange: 0 },
            3: { gold: 2, orange: 0 }
        };

        // ฟังก์ชันอัปเดตสถิติผู้เล่น
        function updatePlayerStat(index, type, change) {
            if (playerStats[index]) {
                playerStats[index][type] = playerStats[index][type] + change;
                updateCharacterSpace();
            }
        }

        // ฟังก์ชันดึงข้อมูลผู้เล่นจาก add-player-buttons
        function getPlayerData(index) {
            const playerElement = document.querySelector(`.player-img[data-index="${index}"]`);
            if (playerElement) {
                return {
                    src: playerElement.src,
                    border: playerElement.style.borderColor || "#f97316"
                };
            }
            return null;
        }

        // ฟังก์ชันอัปเดต character-space
        function updateCharacterSpace() {
            const characterCards = document.querySelectorAll('#character-space > div');

            for (let i = 0; i < 4; i++) {
                const playerData = getPlayerData(i);
                const card = characterCards[i];
                const img = card.querySelector('img');
                const goldCount = card.querySelector('.gold-count');
                const orangeCount = card.querySelector('.orange-count');

                // อัปเดตรูปและขอบ
                if (playerData) {
                    img.src = playerData.src;
                    img.style.borderColor = playerData.border;
                    img.style.opacity = '1';
                } else {
                    img.src = '';
                    img.style.borderColor = '#f97316';
                    img.style.opacity = '0.3';
                }

                // อัปเดตสถิติ
                goldCount.textContent = playerStats[i].gold;
                orangeCount.textContent = playerStats[i].orange;
            }
        }
    </script>

        document.getElementById('saveBtn').addEventListener('click', () => {
            const saveData = { layout };

            for (let i = 0; i < 4; i++) {
                const player = document.querySelector(`.player-img[data-index="${i}"]`);
                if (player) {
                    saveData[`player${i + 1}`] = {
                        src: player.src,
                        border: player.style.borderColor || "#f97316"
                    };
                } else {
                    saveData[`player${i + 1}`] = null;
                }
            }

            // Save shop items
            for (let i = 0; i < 45; i++) {
                const cell = document.getElementById(`data-index-${i}`);
                if (cell && cell.innerHTML.trim() !== '+') {
                    saveData[`shop${i}`] = {
                        content: cell.innerHTML,
                        title: cell.dataset.description || ''
                    };
                }
            }

            const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'game_save.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        // LOAD LOGIC
        let hasLoadedBefore = false;
        document.getElementById('loadFile').addEventListener('change', (e) => {
            changePageBoard(); // เปลี่ยนหน้าเป็นหน้า Game Board

            if (!hasLoadedBefore) {
                const confirmRefresh = confirm("การโหลดจะแทนที่ข้อมูลทั้งหมดในที่นี้\n\nคุณต้องการโหลดไฟล์ต่อเลยหรือไม่?");
                if (!confirmRefresh) {
                    e.target.value = ''; // เคลียร์ input เพื่อให้เลือกใหม่ได้
                    return;
                }
                hasLoadedBefore = true;
            }

            // ตรวจสอบว่าไฟล์ถูกเลือกหรือไม่
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data.layout)) throw "layout missing";

                    // อัปเดต layout ตัวแปร
                    layout = data.layout;

                    // เปลี่ยน playerStats เป็นค่าเริ่มต้น
                    playerStats = {
                        0: { gold: 2, orange: 0 },
                        1: { gold: 2, orange: 0 },
                        2: { gold: 2, orange: 0 },
                        3: { gold: 2, orange: 0 }
                    };

                    // อัปเดตทุกช่องบนบอร์ด
                    data.layout.forEach((row, y) => {
                        row.forEach((type, x) => {
                            const div = document.querySelector(`.cell[data-row="${y}"][data-col="${x}"]`);
                            if (!div) return;  // ช่อง null ก็ข้าม
                            const typeSpan = div.querySelector('.cell-type');
                            loadLayout(type, div, typeSpan);
                        });
                    });

                    // ลบ token ที่มี data-index (ตัวหมาก)
                    document.querySelectorAll('#game-board .absolute[data-index]').forEach(el => el.remove());

                    // แสดงผู้เล่นจากข้อมูล JSON
                    for (let i = 0; i < 4; i++) {
                        const key = `player${i + 1}`;
                        const src = data[key];
                        if (src) {
                            createPlayerFromSrc(i, src);
                        }
                    }

                    // อัปเดต shop space
                    for (let i = 0; i < 45; i++) {
                        const cell = document.getElementById(`data-index-${i}`);
                        const saved = data[`shop${i}`];
                        if (cell && saved) {
                            cell.innerHTML = saved.content;
                            if (saved.title) {
                                cell.dataset.description = saved.title;
                            }
                            bindItemContextMenu(cell, i, saved.title);
                            cell.classList.add('disabled');
                        }
                    }
                } catch (err) {
                    console.error("Error loading file:", err);
                    alert("ไม่สามารถโหลดไฟล์นี้ได้ กรุณาใช้ไฟล์ที่ถูกต้องค่ะ 🍊");
                }
                // ลบค่า loadFile เพื่อสามารถโหลดเดิมซ้ำได้
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        function createPlayerFromSrc(index, data) {
            const addPlayerDiv = document.getElementById('add-player-buttons');
            const currentBtn = addPlayerDiv.querySelector(`[data-index="${index}"]`);
            if (!currentBtn) return;

            const btnSize = currentBtn.offsetWidth;
            const imgUrl = typeof data === "string" ? data : data.src;
            const border = typeof data === "string" ? "#f97316" : data.border || "#f97316";

            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = "Player";
            img.className = "player-img rounded-full object-cover cursor-pointer";
            img.style.width = img.style.height = btnSize + "px";
            img.style.border = `4px solid ${border}`;
            img.style.background = "#fff";
            img.style.boxShadow = "0 2px 8px rgba(0,0,0,0.15)";
            img.dataset.index = index;


            // เพิ่ม contextmenu สำหรับลบ (copy logic เดิม)
            img.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                document.querySelectorAll('.player-context-menu').forEach(m => m.remove());

                const menu = document.createElement('div');
                menu.className = "player-context-menu absolute bg-white border rounded shadow px-3 py-2 text-sm z-50";
                menu.style.top = e.clientY + "px";
                menu.style.left = e.clientX + "px";
                menu.innerHTML = `<button class="text-red-600 hover:underline" type="button">ลบผู้เล่น</button>`;

                menu.querySelector('button').addEventListener('click', () => {
                    const newBtn = createAddPlayerButton(index, btnSize);
                    img.replaceWith(newBtn);
                    window.bindAddPlayerBtnEvents();
                    updateCharacterSpace();
                    menu.remove();

                    board.querySelectorAll(`.absolute[data-index="${index}"]`).forEach(token => token.remove());
                });

                document.body.addEventListener('click', function removeMenu(ev) {
                    if (!menu.contains(ev.target)) {
                        menu.remove();
                        document.body.removeEventListener('click', removeMenu);
                    }
                });

                document.body.appendChild(menu);
            });

            currentBtn.replaceWith(img);

            // เพิ่ม token ที่ตำแหน่ง START
            const startCell = [...document.querySelectorAll('.cell')].find(cell => {
                return cell.textContent.includes("START");
            });

            if (startCell) {
                const token = document.createElement('div');
                token.className = "absolute rounded-full border-4 cursor-grab active:cursor-grabbing";
                token.style.width = "48px";
                token.style.height = "48px";
                token.style.backgroundImage = `url(${imgUrl})`;
                token.style.backgroundSize = "cover";
                token.style.borderColor = border;
                token.style.backgroundColor = "#fff";
                token.dataset.index = index;

                const rect = startCell.getBoundingClientRect();
                const boardRect = board.getBoundingClientRect();
                token.style.left = `${rect.left - boardRect.left + rect.width / 2 - 16}px`;
                token.style.top = `${rect.top - boardRect.top + rect.height / 2 - 16}px`;

                token.draggable = true;
                token.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', token.dataset.index);
                    token.classList.add("opacity-50");
                });
                token.addEventListener('dragend', (e) => {
                    token.classList.remove("opacity-50");
                });

                board.appendChild(token);
                updateCharacterSpace();
            }
        }
    </script>
